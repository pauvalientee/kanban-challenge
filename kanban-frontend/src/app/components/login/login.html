<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          placeholder="pau@test.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          placeholder="******">
      </div>

      @if (errorMessage) {
        <p class="error-msg">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-submit">Entrar al Tablero</button>
    </form>

    <div class="guest-section">
      <div class="separator">
        <span>O también</span>
      </div>
      <button type="button" (click)="loginAsGuest()" class="btn-guest">
        Entrar como Invitado (Demo)
      </button>
    </div>

    <div class="footer-link">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>
  </div>
</div>
